<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peje Clicker</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>🪙 PEJE CLICKER</h1>

    <div id="coinCount">0 PejeCoins</div>

    <div id="pps">
        0 PPS
    </div>

    <div id="currentRole">
        Rol: Vagabundo (1x)
    </div>

    <div id="saveStatus">
        ✔ Guardado automático activo
    </div>

    <div id="gameArea">
        <img
            src="assets/amlocoin.png"
            id="coin"
            alt="AMLCoin"
        >
    </div>

    <div id="bottomBar">

        <button id="shopButton">
            🏪 Tienda
        </button>

        <button id="statsButton">
            📊 Estadísticas
        </button>

        <button id="achievementsButton">
            🏆 Logros
        </button>

        <button id="devButton">
            🛠 Dev
        </button>

    </div>

    <div id="shopPanel" class="shop-panel">

        <h2 class="shop-title">
            🏪 Tienda de Roles
        </h2>

        <div id="rolesContainer"></div>

        <h2 class="shop-title">
    ⚙ Generadores
</h2>

<div id="generatorsContainer">

</div>
        
    </div>

    <div id="devPanel" class="shop-panel">

        <h2 class="shop-title">
            🛠 Panel Dev
        </h2>

        <div class="dev-section">

            <input
                type="number"
                id="addCoinsInput"
                placeholder="Cantidad"
            >

            <button id="addCoinsButton">
                Añadir PC
            </button>

        </div>

        <div class="dev-section">

            <input
                type="number"
                id="removeCoinsInput"
                placeholder="Cantidad"
            >

            <button id="removeCoinsButton">
                Restar PC
            </button>

        </div>

    </div>

    <script src="js/script.js"></script>
    <script src="js/save.js"></script>

</body>
</html>
