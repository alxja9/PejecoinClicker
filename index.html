<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pejecoin Clicker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#1f1f1f;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
            text-align:center;
            min-height:100vh;
        }

        h1{
            margin-top:20px;
            font-size:3rem;
        }

        #coinCount{
            font-size:2rem;
            margin:20px 0;
        }

        #coin{
            width:300px;
            cursor:pointer;
            user-select:none;
            transition:transform .1s ease;
        }

        #coin:hover{
            transform:scale(1.05);
        }

        #coin:active{
            transform:scale(0.95);
        }

        .info{
            margin-top:20px;
            color:#bdbdbd;
        }
    </style>
</head>
<body>

    <h1>🪙 Pejecoin Clicker</h1>

    <div id="coinCount">0 Pejecoins</div>

    <img
        src="assets/amlocoin.png"
        id="coin"
        alt="Pejecoin"
    >

    <div class="info">
        Haz clic en la moneda para ganar Pejecoins.
    </div>

    <script>
        let coins = 0;

        const coin = document.getElementById("coin");
        const counter = document.getElementById("coinCount");

        function updateDisplay() {
            counter.textContent =
                coins.toLocaleString() + " Pejecoins";
        }

        coin.addEventListener("click", () => {
            coins++;
            updateDisplay();
        });

        updateDisplay();
    </script>

</body>
</html>
