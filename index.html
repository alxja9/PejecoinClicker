<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMLO Coin Clicker</title>

<style>
body{
    background:#1e1e1e;
    color:white;
    text-align:center;
    font-family:Arial,sans-serif;
}

h1{
    margin-top:30px;
}

#cookieCount{
    font-size:2rem;
    margin:20px;
}

#cookie{
    width:250px;
    cursor:pointer;
    transition:transform .1s;
}

#cookie:hover{
    transform:scale(1.05);
}

#cookie:active{
    transform:scale(.95);
}
</style>

</head>
<body>

<h1>AMLO Coin Clicker</h1>

<div id="cookieCount">0 Monedas</div>

<img src="assets/amlocoin.png" id="cookie" alt="AMLO Coin">

<script>
let coins = 0;

const coin = document.getElementById("cookie");
const counter = document.getElementById("cookieCount");

function updateDisplay(){
    counter.textContent = coins + " Monedas";
}

coin.addEventListener("click", () => {
    coins++;
    updateDisplay();
});

updateDisplay();
</script>

</body>
</html>
